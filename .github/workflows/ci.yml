name: CI

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# You can leverage Vercel Remote Caching with Turbo to speed up your builds
# @link https://turborepo.org/docs/core-concepts/remote-caching#remote-caching-on-vercel-builds
env:
  FORCE_COLOR: 3
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./internals/github/setup

      - name: Copy env
        shell: bash
        run: cp .env.example .env

      - name: Check
        run: bun check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./internals/github/setup

      - name: Generate modules
        run: bun run generate:modules

      - name: Typecheck
        run: bun typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./internals/github/setup

      - name: Copy env
        shell: bash
        run: cp .env.example .env

      - name: Unit tests
        run: bun run test

  test-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [typecheck]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: 86d
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/86d
      DATABASE_URL_UNPOOLED: postgresql://postgres:postgres@localhost:5432/86d
      BETTER_AUTH_SECRET: ci-test-secret-not-for-production
      # Force IPv4 in CI (some runners resolve `localhost` to ::1 first).
      E2E_STORE_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./internals/github/setup

      - name: Copy env
        shell: bash
        run: cp .env.example .env

      - name: Generate modules
        run: bun run generate:modules

      - name: Create nanoid function
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d 86d <<'SQL'
          CREATE EXTENSION IF NOT EXISTS pgcrypto;
          CREATE OR REPLACE FUNCTION nanoid(
            size int DEFAULT 21,
            alphabet text DEFAULT '_-0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ'
          ) RETURNS text LANGUAGE plpgsql VOLATILE AS $func$
          DECLARE
            id text := '';
            i int := 0;
            bytes bytea;
            idx int;
            mask int;
            step int;
          BEGIN
            mask := (2 << cast(floor(log(length(alphabet) - 1) / log(2)) as int)) - 1;
            step := cast(ceil(1.6 * mask * size / length(alphabet)) as int);
            LOOP
              bytes := gen_random_bytes(step);
              WHILE i < step LOOP
                idx := (get_byte(bytes, i) & mask) + 1;
                IF idx <= length(alphabet) THEN
                  id := id || substr(alphabet, idx, 1);
                  IF length(id) = size THEN RETURN id; END IF;
                END IF;
                i := i + 1;
              END LOOP;
              i := 0;
            END LOOP;
          END
          $func$;
          SQL

      - name: Push database schema
        working-directory: packages/db
        run: bunx prisma db push --schema prisma --accept-data-loss

      - name: Seed database
        run: bun run db:seed

      - name: Install Playwright
        run: bunx playwright install --with-deps chromium

      - name: Build store
        run: bun run build:store

      - name: Start store server
        run: |
          cd apps/store && bun run start &
          echo $! > /tmp/store.pid
          bunx wait-on tcp:127.0.0.1:3000 --timeout 120000

      - name: E2E tests
        run: bun test:e2e

      - name: Regenerate visual snapshots
        if: always() && github.ref == 'refs/heads/main'
        run: bunx playwright test visual.spec.ts --update-snapshots

      - name: Commit updated visual snapshots
        if: always() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/visual.spec.ts-snapshots/
          git diff --staged --quiet || git commit -m "chore: update visual snapshots [skip ci]" && git push

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn
